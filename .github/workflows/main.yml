# GitHub Actions Workflow for Building Telegram Android APK
# Version: 4

name: Build Telegram APK

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Java JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Components
        run: |
          sdkmanager --update
          sdkmanager --install "build-tools;35.0.0" "platforms;android-35" "ndk;21.4.7075529" "cmake;3.22.1"
          yes | sdkmanager --licenses

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Configure Signing
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          ALIAS_NAME: ${{ secrets.ALIAS_NAME }}
          ALIAS_PASS: ${{ secrets.ALIAS_PASS }}
          TELEGRAM_APP_ID: ${{ secrets.TELEGRAM_APP_ID }}
          TELEGRAM_APP_HASH: ${{ secrets.TELEGRAM_APP_HASH }}
        run: |
          cat > local.properties << EOF
          RELEASE_STORE_PASSWORD=${KEYSTORE_PASS}
          RELEASE_KEY_ALIAS=${ALIAS_NAME}
          RELEASE_KEY_PASSWORD=${ALIAS_PASS}
          EOF

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v1 

      - name: Build APK
        run: |
          echo "Building afatRelease APK..."
          ./gradlew :TMessagesProj_App:assembleAfatRelease --no-daemon --stacktrace

      - name: List Built APKs
        run: |
          echo "=== Built APK Files ==="
          find . -name "*.apk" -type f -exec ls -lh {} \;
          echo "======================="

      - name: Rename APK Files
        id: rename_apk
        run: |
          VERSION_NAME=$(grep "APP_VERSION_NAME" gradle.properties | cut -d'=' -f2)
          VERSION_CODE=$(grep "APP_VERSION_CODE" gradle.properties | cut -d'=' -f2)
          BUILD_DATE=$(date +%Y%m%d_%H%M%S)
          
          mkdir -p output
          APK_PATH=$(find TMessagesProj_App/build/outputs/apk -name "*.apk" -type f | head -n 1)
          
          if [ -n "$APK_PATH" ]; then
            NEW_NAME="Telegram_v${VERSION_NAME}_${BUILD_DATE}.apk"
            cp "$APK_PATH" "output/${NEW_NAME}"
            echo "apk_name=${NEW_NAME}" >> $GITHUB_OUTPUT
            echo "apk_path=output/${NEW_NAME}" >> $GITHUB_OUTPUT
            echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
            echo "APK renamed to: ${NEW_NAME}"
          else
            echo "No APK found!"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-APK-${{ steps.rename_apk.outputs.version_name }}
          path: output/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports/
            **/build/outputs/logs/
          retention-days: 7
